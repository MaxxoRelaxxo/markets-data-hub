name: Update market data

# Fetches fresh data from Riksbank APIs, web scraping, and SCB,
# commits updated Parquet files, and pushes to main.
# The push triggers the "Deploy to GitHub Pages" workflow automatically
# (pages.yml watches src/markets_data_hub/data/**).

on:
  schedule:
    - cron: "15 9 * * 1-5"   # Weekdays 09:15 UTC – after Riksbank publishes
  workflow_dispatch:
    inputs:
      targets:
        description: "What to fetch (auto = day-based, all = everything)"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - all
          - apis
          - certificates
          - bonds
          - scb

permissions:
  contents: write

concurrency:
  group: "update-data"
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Tooling ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --no-dev

      # ── Day-of-week logic ────────────────────────────────────
      - name: Determine targets
        id: targets
        run: |
          DAY=$(date -u +%A)
          INPUT="${{ github.event.inputs.targets }}"

          # Default: schedule → auto
          MODE="${INPUT:-auto}"

          RUN_APIS=true
          RUN_CERTS=false
          RUN_BONDS=false
          RUN_SCB=false

          if [ "$MODE" = "all" ]; then
            RUN_CERTS=true
            RUN_BONDS=true
            RUN_SCB=true
          elif [ "$MODE" = "auto" ]; then
            # Certificates auction results published on Tuesdays
            [ "$DAY" = "Tuesday" ] && RUN_CERTS=true
            # Bond auction results published on Fridays
            [ "$DAY" = "Friday" ] && RUN_BONDS=true
            # SCB on 19th banking day of the month
            IS_19TH=$(uv run python scripts/fetch_data.py --check-19th)
            [ "$IS_19TH" = "true" ] && RUN_SCB=true
          elif [ "$MODE" = "apis" ]; then
            : # only APIs
          elif [ "$MODE" = "certificates" ]; then
            RUN_CERTS=true
          elif [ "$MODE" = "bonds" ]; then
            RUN_BONDS=true
          elif [ "$MODE" = "scb" ]; then
            RUN_SCB=true
          fi

          echo "apis=$RUN_APIS" >> "$GITHUB_OUTPUT"
          echo "certs=$RUN_CERTS" >> "$GITHUB_OUTPUT"
          echo "bonds=$RUN_BONDS" >> "$GITHUB_OUTPUT"
          echo "scb=$RUN_SCB" >> "$GITHUB_OUTPUT"
          echo "Summary: apis=$RUN_APIS certs=$RUN_CERTS bonds=$RUN_BONDS scb=$RUN_SCB"

      # ── Fetch data ───────────────────────────────────────────
      - name: Fetch SWESTR + policy rate
        if: steps.targets.outputs.apis == 'true'
        env:
          RIKSBANK_API_KEY: ${{ secrets.RIKSBANK_API_KEY }}
        run: uv run python scripts/fetch_data.py --swestr --policy-rate

      - name: Fetch Riksbank certificates
        if: steps.targets.outputs.certs == 'true'
        run: uv run python scripts/fetch_data.py --certificates

      - name: Fetch government bonds
        if: steps.targets.outputs.bonds == 'true'
        run: uv run python scripts/fetch_data.py --bonds

      - name: Fetch SCB rates
        if: steps.targets.outputs.scb == 'true'
        run: uv run python scripts/fetch_data.py --scb

      # ── Commit & push ───────────────────────────────────────
      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/markets_data_hub/data/*.parquet
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update market data $(date -u +%Y-%m-%d)"
            git push
          fi
